{% extends "base.html" %}
{% block title %}Register – ExpenseIQ{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-piggy-bank-fill"></i></div>
    <h4 class="auth-title">Create Account</h4>
    <p class="auth-sub">Sign up for your private ExpenseIQ account</p>

    <form method="post" action="{{ url_for('register') }}">
      <div class="form-group">
        <label class="form-label-fancy">Username</label>
        <div class="input-fancy">
          <i class="bi bi-person-fill input-icon"></i>
          <input type="text" name="username" class="input-field"
                 placeholder="Choose a username" value="{{ form.get('username','') }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label-fancy">Email</label>
        <div class="input-fancy">
          <i class="bi bi-envelope-fill input-icon"></i>
          <input type="email" name="email" class="input-field"
                 placeholder="Your email" value="{{ form.get('email','') }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label-fancy">Password</label>
        <div class="input-fancy">
          <i class="bi bi-lock-fill input-icon"></i>
          <input type="password" name="password" class="input-field"
                 placeholder="Min 6 characters" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label-fancy">Confirm Password</label>
        <div class="input-fancy">
          <i class="bi bi-shield-lock-fill input-icon"></i>
          <input type="password" name="confirm" class="input-field"
                 placeholder="Repeat password" required>
        </div>
      </div>
      <button type="submit" class="btn-fancy btn-fancy-primary w-100 mt-3">
        <i class="bi bi-person-plus-fill me-1"></i> Create Account
      </button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</div>
{% endblock auth_content %}
