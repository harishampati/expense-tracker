{% extends "base.html" %}
{% block title %}Error – ExpenseIQ{% endblock %}

{% block auth_content %}
<div class="auth-page">
  <div class="auth-card" style="text-align:center;padding:3rem 2rem;">
    <div style="font-size:3.5rem;margin-bottom:1rem;">⚠️</div>
    <h4 style="color:#fff;margin-bottom:.5rem;">Something went wrong</h4>
    <p style="color:#555;margin-bottom:2rem;">The server hit an unexpected error. Please try again.</p>
    <a href="{{ url_for('login') }}" class="btn-fancy btn-fancy-primary" style="display:inline-flex;width:auto;padding:.75rem 2rem;">Go back</a>
  </div>
</div>
{% endblock %}
