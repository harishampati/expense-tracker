{% extends "base.html" %}
{% block title %}Login – ExpenseIQ{% endblock %}

{% block auth_content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-piggy-bank-fill"></i></div>
    <h4 class="auth-title">Welcome Back</h4>
    <p class="auth-sub">Log in to your ExpenseIQ account</p>

    <form method="post" action="{{ url_for('login') }}">
      <div class="form-group">
        <label class="form-label-fancy">Username</label>
        <div class="input-fancy">
          <i class="bi bi-person-fill input-icon"></i>
          <input type="text" name="username" class="input-field"
                 placeholder="Your username" value="{{ form.get('username','') }}" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label-fancy">Password</label>
        <div class="input-fancy">
          <i class="bi bi-lock-fill input-icon"></i>
          <input type="password" name="password" class="input-field"
                 placeholder="Your password" required>
        </div>
      </div>
      <button type="submit" class="btn-fancy btn-fancy-primary w-100 mt-3">
        <i class="bi bi-box-arrow-in-right me-1"></i> Login
      </button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
  </div>
</div>
{% endblock auth_content %}
